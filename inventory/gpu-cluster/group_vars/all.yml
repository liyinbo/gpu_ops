---
ansible_user: ubuntu
ansible_become_password: "{{ vault_ansible_become_password | default(omit) }}"
cluster_name: gpu-cluster

k3s_version: v1.31.6+k3s1
k3s_token: "{{ vault_k3s_token | default('change-me-use-vault') }}"
k3s_server_bind_address: 0.0.0.0
k3s_api_port: 6443
k3s_kubeconfig_dest: "{{ playbook_dir }}/../kubeconfig-gpu-cluster.yaml"

k3s_disable_components:
  - traefik
  - servicelb

common_packages:
  - ca-certificates
  - curl
  - gnupg
  - jq
  - nfs-common
  - open-iscsi
  - python3-kubernetes
  - qemu-guest-agent
  - rsync
  - vim

gpu_runtime_install_nvidia_toolkit: true
gpu_runtime_containerd_config_path: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
