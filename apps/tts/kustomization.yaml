---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tts
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment-api.yaml
  - service-api.yaml
  - deployment-web.yaml
  - service-web.yaml
  - certificate.yaml
  - ingress.yaml
configMapGenerator:
  - name: tts-web-assets
    files:
      - web/index.html
      - web/app.js
      - web/styles.css
generatorOptions:
  disableNameSuffixHash: true
