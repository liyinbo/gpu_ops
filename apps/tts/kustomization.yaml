---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tts
resources:
  - namespace.yaml
  - pvc.yaml
  - certificate.yaml
  - ingress.yaml
  - oci-repository.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: tts-service-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
