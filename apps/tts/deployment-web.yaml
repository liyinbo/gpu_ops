---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-web
  namespace: tts
  labels:
    app.kubernetes.io/name: tts-web
    app.kubernetes.io/part-of: tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tts-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tts-web
        app.kubernetes.io/part-of: tts
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: web-assets
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: web-assets
          configMap:
            name: tts-web-assets
