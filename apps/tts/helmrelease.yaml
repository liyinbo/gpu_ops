---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tts-service
  namespace: tts
spec:
  suspend: false
  interval: 30m
  timeout: 30m
  chartRef:
    kind: OCIRepository
    name: tts-service-chart
  install:
    createNamespace: false
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2
  rollback:
    cleanupOnFail: true
  valuesFrom:
    - kind: ConfigMap
      name: tts-service-values
      valuesKey: values.yaml
