---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-tts-api
  namespace: tts
  labels:
    app.kubernetes.io/name: qwen3-tts-api
    app.kubernetes.io/part-of: tts
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen3-tts-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3-tts-api
        app.kubernetes.io/part-of: tts
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm-omni
          image: vllm/vllm-omni:v0.22.0
          imagePullPolicy: IfNotPresent
          command:
            - vllm-omni
          args:
            - serve
            - Qwen/Qwen3-TTS-12Hz-1.7B-Base
            - --host
            - 0.0.0.0
            - --port
            - "8091"
            - --gpu-memory-utilization
            - "0.40"
            - --trust-remote-code
            - --omni
          ports:
            - name: http
              containerPort: 8091
          env:
            - name: HF_HOME
              value: /models/huggingface
            - name: HF_HUB_CACHE
              value: /models/huggingface/hub
            - name: TRANSFORMERS_CACHE
              value: /models/huggingface/transformers
            - name: VLLM_CACHE_ROOT
              value: /models/vllm
          resources:
            requests:
              cpu: "4"
              memory: 24Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 48Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 360
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen3-tts-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
