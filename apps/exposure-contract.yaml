# Machine-readable private HTTPS exposure contract.
# Hostname ownership and LAN DNS records are coordinated in network-ops.
apps:
  - name: tts
    hostname: tts.home.hope-leniency.com
    ingressIP: 192.168.8.130
    namespace: tts
    ingressResource: tts-ingress
    certificateSecret: tts-home-hope-leniency-com-tls
