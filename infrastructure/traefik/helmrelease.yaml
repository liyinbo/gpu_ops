---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "34.*"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    deployment:
      replicas: 1
    service:
      enabled: false
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
    ports:
      web:
        port: 8000
        exposedPort: 80
        hostPort: 80
      websecure:
        port: 8443
        exposedPort: 443
        hostPort: 443
        tls:
          enabled: true
    logs:
      access:
        enabled: true
        format: json
    additionalArguments:
      - "--entrypoints.web.transport.respondingtimeouts.readtimeout=30m"
      - "--entrypoints.websecure.transport.respondingtimeouts.readtimeout=30m"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
