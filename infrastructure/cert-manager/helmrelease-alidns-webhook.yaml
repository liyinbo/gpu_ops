---
# Requires an out-of-band Secret named alidns-secrets in namespace cert-manager.
# Do not commit Alibaba Cloud API tokens in plaintext.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alidns-webhook
  namespace: cert-manager
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager
  chart:
    spec:
      chart: alidns-webhook
      version: "0.8.*"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-alidns-webhook
        namespace: cert-manager
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    groupName: acme.hope-leniency.com
