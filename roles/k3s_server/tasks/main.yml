---
- name: Refuse placeholder k3s token
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length >= 32
      - k3s_token != 'change-me-use-vault'
    fail_msg: "Set vault_k3s_token in the encrypted Ansible Vault file before installing k3s."
    quiet: true

- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write k3s server config
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      token: "{{ k3s_token }}"
      bind-address: "{{ k3s_server_bind_address }}"
      tls-san:
      {% for san in k3s_tls_sans | default([]) %}
        - "{{ san }}"
      {% endfor %}
      write-kubeconfig-mode: "0600"
      disable:
      {% for component in k3s_disable_components %}
        - "{{ component }}"
      {% endfor %}
      node-label:
        - "gpu-ops.io/control-plane=true"
        - "gpu-ops.io/gpu-node=true"
        - "nvidia.com/gpu.present=true"

- name: Install k3s server
  ansible.builtin.shell: |
    set -eu
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s server is enabled and running
  ansible.builtin.service:
    name: k3s
    enabled: true
    state: started

- name: Fetch kubeconfig to controller
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ k3s_kubeconfig_dest }}"
    flat: true
  run_once: true

- name: Point fetched kubeconfig at the first server address
  ansible.builtin.replace:
    path: "{{ k3s_kubeconfig_dest }}"
    regexp: 'https://(127\.0\.0\.1|0\.0\.0\.0):6443'
    replace: "https://{{ ansible_host | default(inventory_hostname) }}:{{ k3s_api_port }}"
  delegate_to: localhost
  become: false
  run_once: true
