---
- name: Refuse placeholder k3s token
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length >= 32
      - k3s_token != 'change-me-use-vault'
    fail_msg: "Set vault_k3s_token in the encrypted Ansible Vault file before installing k3s."
    quiet: true

- name: Resolve first k3s server host
  ansible.builtin.set_fact:
    k3s_first_server: "{{ hostvars[groups['k3s_servers'][0]].ansible_host | default(groups['k3s_servers'][0]) }}"

- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write k3s agent config
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      server: "https://{{ k3s_first_server }}:{{ k3s_api_port }}"
      token: "{{ k3s_token }}"
      node-label:
        - "gpu-ops.io/gpu-node=true"
        - "nvidia.com/gpu.present=true"

- name: Install k3s agent
  ansible.builtin.shell: |
    set -eu
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - agent
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s agent is enabled and running
  ansible.builtin.service:
    name: k3s-agent
    enabled: true
    state: started
