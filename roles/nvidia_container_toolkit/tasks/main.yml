---
- name: Install NVIDIA Container Toolkit prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: gpu_runtime_install_nvidia_toolkit | bool

- name: Add NVIDIA Container Toolkit keyring
  ansible.builtin.shell: |
    set -eu
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
      | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  args:
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  when: gpu_runtime_install_nvidia_toolkit | bool

- name: Add NVIDIA Container Toolkit apt repository
  ansible.builtin.shell: |
    set -eu
    distribution=$(. /etc/os-release; echo "${ID}${VERSION_ID}")
    curl -fsSL "https://nvidia.github.io/libnvidia-container/${distribution}/libnvidia-container.list" \
      | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
      > /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list
  when: gpu_runtime_install_nvidia_toolkit | bool

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true
  when: gpu_runtime_install_nvidia_toolkit | bool

- name: Check for nvidia-smi
  ansible.builtin.command: nvidia-smi
  register: nvidia_smi_result
  changed_when: false
  failed_when: false

- name: Show GPU discovery result
  ansible.builtin.debug:
    msg: "{{ nvidia_smi_result.stdout_lines | default(['nvidia-smi not available']) }}"

