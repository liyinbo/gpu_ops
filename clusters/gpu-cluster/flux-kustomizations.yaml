---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gpu-platform-traefik
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/traefik
  prune: true
  sourceRef:
    kind: GitRepository
    name: gpu-ops
  timeout: 10m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gpu-platform-cert-manager
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: gpu-ops
  timeout: 15m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gpu-platform-cert-issuers
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/cert-manager-issuers
  prune: true
  sourceRef:
    kind: GitRepository
    name: gpu-ops
  dependsOn:
    - name: gpu-platform-cert-manager
  timeout: 10m
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gpu-platform-nvidia
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/nvidia-gpu-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: gpu-ops
  timeout: 30m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gpu-apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: gpu-ops
  dependsOn:
    - name: gpu-platform-traefik
    - name: gpu-platform-cert-issuers
    - name: gpu-platform-nvidia
  timeout: 30m
  wait: false
